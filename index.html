<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LASIGE Christmas Fundraiser</title>
  <style>
    :root{
      --bg1:#0b3d2e;
      --bg2:#0b1f3d;
      --card: rgba(255,255,255,.10);
      --card2: rgba(255,255,255,.14);
      --text: #ffffff;
      --muted: rgba(255,255,255,.80);
      --accent: #e53935;
      --accent2:#2e7d32;
      --gold:#ffd54f;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(255,255,255,.14), transparent 55%),
        radial-gradient(900px 500px at 90% 20%, rgba(255,213,79,.12), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    /* Snow */
    .snow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .flake {
      position: absolute;
      top: -10vh;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      filter: drop-shadow(0 0 6px rgba(255,255,255,.35));
      animation: fall linear infinite;
      opacity: .9;
    }
    @keyframes fall {
      to { transform: translate3d(var(--drift), 120vh, 0); }
    }

    header{
      position: relative;
      z-index: 1;
      padding: 40px 18px 18px;
      text-align: center;
    }
    .title-wrap{
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding: 16px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    h1{
      margin:0;
      font-size: clamp(28px, 4vw, 52px);
      letter-spacing: .5px;
      text-transform: none;
    }
    .orn{
      font-size: 28px;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.35));
    }

    main{
      position: relative;
      z-index: 1;
      min-height: calc(100% - 120px);
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 18px;
    }

    .panel{
      width: min(720px, 95vw);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 26px 22px;
    }

    .counter{
      position: relative;
      display:flex;
      flex-direction: column;
      align-items:center;
      gap: 14px;
      padding: 14px 10px 10px;
    }

    .counter-value{
      font-size: clamp(48px, 7vw, 86px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: .5px;
      text-shadow: 0 10px 26px rgba(0,0,0,.35);
    }

/* Money add animation */
.counter-value.counter-bump{
  animation: counterBump .55s ease;
}
@keyframes counterBump{
  0%{
    transform: scale(1);
    color: var(--text);
    text-shadow: 0 10px 26px rgba(0,0,0,.35);
  }
  35%{
    transform: scale(1.045);
    color: var(--accent2);
    text-shadow:
      0 10px 26px rgba(0,0,0,.35),
      0 0 22px rgba(46,125,50,.55);
  }
  100%{
    transform: scale(1);
    color: var(--text);
    text-shadow: 0 10px 26px rgba(0,0,0,.35);
  }
}

.money-pop{
  position: absolute;
  left: 50%;
  top: 2px;
  transform: translateX(-50%);
  font-size: 18px;
  font-weight: 900;
  letter-spacing: .3px;
  color: var(--accent2);
  opacity: 0;
  pointer-events: none;
  text-shadow: 0 10px 26px rgba(0,0,0,.35), 0 0 18px rgba(46,125,50,.35);
  filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
}
.money-pop.show{
  animation: moneyPop .8s ease forwards;
}
@keyframes moneyPop{
  0%{
    opacity: 0;
    transform: translateX(-50%) translateY(10px) scale(.92);
  }
  20%{
    opacity: 1;
  }
  100%{
    opacity: 0;
    transform: translateX(-50%) translateY(-26px) scale(1.06);
  }
}

    .sub{
      color: var(--muted);
      margin: 0;
      font-size: 14px;
    }

    .controls{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .row{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    label{
      font-size: 14px;
      color: var(--muted);
    }

    input{
      width: 220px;
      max-width: 80vw;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(10,10,10,.22);
      color: var(--text);
      outline: none;
    }
    input::placeholder{ color: rgba(255,255,255,.55); }
    input:focus{
      border-color: rgba(255,213,79,.60);
      box-shadow: 0 0 0 4px rgba(255,213,79,.12);
    }

    button{
      padding: 14px 18px;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: .3px;
      box-shadow: 0 14px 30px rgba(0,0,0,.35);
      transform: translateZ(0);
      transition: transform .08s ease, filter .2s ease, opacity .2s ease;
    }
    button:active{ transform: scale(.98); }

    .sold{
      background: linear-gradient(135deg, var(--accent), #ff6f60);
      color: white;
      min-width: 220px;
    }
    .sold:hover{ filter: brightness(1.05); }

    .tiny{
      padding: 10px 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(46,125,50,.9), rgba(46,125,50,.65));
      color: white;
      font-weight: 700;
      box-shadow: none;
      opacity: .92;
    }
    .tiny:hover{ opacity: 1; }

    .hint{
      text-align:center;
      color: rgba(255,255,255,.82);
      font-size: 13px;
      margin-top: 10px;
    }

    .status{
      text-align:center;
      margin-top: 10px;
      color: rgba(255,213,79,.95);
      font-size: 13px;
      min-height: 18px;
    }

    .footer{
      margin-top: 18px;
      text-align:center;
      color: rgba(255,255,255,.72);
      font-size: 12px;
    }

    .chip{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
    }

    /* Bottom-right payment box */
    .payment-box{
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 5;
      width: min(340px, calc(100vw - 32px));
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .payment-title{
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .2px;
      color: rgba(255,255,255,.92);
      margin-bottom: 8px;
    }
    .payment-box input{
      width: 100%;
      max-width: none;
      padding: 10px 12px;
      border-radius: 14px;
    }
    .payment-display{
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,.80);
      word-break: break-word;
    }
    .payment-display strong{
      color: var(--gold);
      font-weight: 900;
    }
  
    /* Top-right actions (Charity Poll + QR) */
    .top-actions{
      position:fixed;
      top:16px;
      right:16px;
      z-index:9999;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .action-link{
      padding:10px 14px;
      border-radius:999px;
      font-weight:700;
      text-decoration:none;
      color:#111;
      background: var(--gold);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      border: 1px solid rgba(0,0,0,.15);
    }
    .action-link:hover{ filter: brightness(1.05); }

    .action-btn{
      padding:10px 14px;
      border-radius:999px;
      font-weight:700;
      letter-spacing: .2px;
      background: rgba(255,255,255,.14);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }
    .action-btn:hover{ filter: brightness(1.06); }

    /* QR modal */
    .qr-modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background: rgba(0,0,0,.55);
      z-index:10000;
    }
    .qr-modal.show{ display:flex; }
    .qr-modal-card{
      width:min(520px, 92vw);
      border-radius: 18px;
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 18px;
      position: relative;
    }
    .qr-modal-title{
      margin: 0 44px 8px 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .qr-modal-sub{
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .qr-img{
      width:100%;
      height:auto;
      display:block;
      border-radius: 14px;
      background: #fff;
      padding: 10px;
    }
    .qr-close{
      position:absolute;
      top:10px;
      right:10px;
      width:36px;
      height:36px;
      border-radius:999px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.35);
      color:#fff;
      font-size:22px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:none;
      padding:0;
    }
    .qr-close:hover{ filter: brightness(1.08); }

    @media (max-width:480px){
      .top-actions{ top:10px; right:10px; gap:8px; }
      .action-link, .action-btn{ padding:9px 12px; font-size:14px; }
    }


</style>
</head>

<body>
  <div class="top-actions" aria-label="Quick actions">
    <a class="action-link" href="/charity-poll" aria-label="Open Charity Poll">Charity Poll</a>
    <button class="action-btn" id="qrOpenBtn" type="button" aria-haspopup="dialog" aria-controls="qrModal">QR code</button>
  </div>

  <div class="snow" aria-hidden="true" id="snow"></div>

  <div class="qr-modal" id="qrModal" role="dialog" aria-modal="true" aria-labelledby="qrModalTitle" aria-hidden="true">
    <div class="qr-modal-card" role="document">
      <button class="qr-close" id="qrCloseBtn" type="button" aria-label="Close">×</button>
      <h2 class="qr-modal-title" id="qrModalTitle">Charity Poll QR</h2>
      <p class="qr-modal-sub">Scan this QR code to open the Charity Poll page.</p>
      <img class="qr-img" src="Fundraiser%20QR.png" alt="QR code for the Charity Poll page" />
    </div>
  </div>

  <header>
    <div class="title-wrap">
      <span class="orn">🎄</span>
      <h1>LASIGE Christmas Fundraiser</h1>
      <span class="orn">✨</span>
    </div>
  </header>

  <main>
    <section class="panel" aria-label="Fundraiser counter">
      <div class="counter">
        <div class="counter-value" id="counter">€0,00</div>
        <div class="money-pop" id="moneyPop" aria-hidden="true"></div>
        <p class="sub">Total raised</p>
      </div>

      <div class="controls">
        <div class="row">
          <label for="price">Item price</label>
          <input id="price" inputmode="decimal" placeholder="e.g., 2,5 €" value="2,5" />
        </div>

        <div class="row">
          <button class="sold" id="soldBtn" type="button">SOLD +1</button>
          <button class="tiny" id="resetBtn" type="button" title="Resets total on this device">Reset</button>
        </div>

        <div class="hint">
          Tip: you can type <span class="chip">2,5</span> or <span class="chip">2.5</span> or <span class="chip">2,50 €</span>.
        </div>
        <div class="status" id="status" role="status" aria-live="polite"></div>

        <div class="footer">
          Saves locally in your browser (so refreshing won’t lose the total).
        </div>
      </div>
    </section>
  </main>

  <aside class="payment-box" aria-label="Payment options">
    <div class="payment-title">Pay by cash or by MBWAY:</div>
    <input id="mbwayPhone" type="tel" inputmode="tel" autocomplete="tel" placeholder="Phone number (e.g., 9xxxxxxxx)" />
    <div class="payment-display">MBWAY phone: <strong id="mbwayPhoneDisplay">—</strong></div>
  </aside>

  <script>
    // --- Formatting ---
    const fmt = new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' });

    function parseEuroToCents(raw) {
      // Accept "2,5", "2.5", "2,50 €", "1.234,56", "1,234.56"
      let s = String(raw ?? '').trim();

      // Keep digits, comma, dot, minus
      s = s.replace(/[^\d.,-]/g, '');

      if (!s) return null;

      const hasComma = s.includes(',');
      const hasDot = s.includes('.');

      if (hasComma && hasDot) {
        // Assume the last separator is the decimal separator
        const lastComma = s.lastIndexOf(',');
        const lastDot = s.lastIndexOf('.');
        const decIsComma = lastComma > lastDot;

        if (decIsComma) {
          // Remove thousand dots, turn decimal comma into dot
          s = s.replace(/\./g, '').replace(',', '.');
        } else {
          // Remove thousand commas
          s = s.replace(/,/g, '');
        }
      } else if (hasComma && !hasDot) {
        // European decimal comma
        s = s.replace(',', '.');
      }

      const value = Number.parseFloat(s);
      if (!Number.isFinite(value) || value < 0) return null;

      return Math.round(value * 100);
    }

    // --- State (stored locally) ---
    const STORAGE_KEY = 'lasige_xmas_total_cents_v1';

    const counterEl = document.getElementById('counter');
    const priceEl = document.getElementById('price');
    const statusEl = document.getElementById('status');
    const soldBtn = document.getElementById('soldBtn');
    const resetBtn = document.getElementById('resetBtn');
const moneyPopEl = document.getElementById('moneyPop');

    // --- MBWAY phone (stored locally) ---
    const MBWAY_PHONE_KEY = 'lasige_xmas_mbway_phone_v1';
    const mbwayPhoneEl = document.getElementById('mbwayPhone');
    const mbwayPhoneDisplayEl = document.getElementById('mbwayPhoneDisplay');

    function setMbwayPhone(value){
      const v = String(value ?? '').trim();
      if (mbwayPhoneDisplayEl) mbwayPhoneDisplayEl.textContent = v || '—';
      try { localStorage.setItem(MBWAY_PHONE_KEY, v); } catch (_) {}
    }

    // Initialize saved phone
    if (mbwayPhoneEl) {
      let saved = '';
      try { saved = localStorage.getItem(MBWAY_PHONE_KEY) || ''; } catch (_) {}
      mbwayPhoneEl.value = saved;
      setMbwayPhone(saved);
      mbwayPhoneEl.addEventListener('input', () => setMbwayPhone(mbwayPhoneEl.value));
    }

function animateAdd(priceCents){
  // Restart counter animation
  counterEl.classList.remove('counter-bump');
  void counterEl.offsetWidth; // reflow to restart animation
  counterEl.classList.add('counter-bump');

  // Show the green “+€X,XX” pop
  if (moneyPopEl) {
    moneyPopEl.textContent = `+${fmt.format(priceCents / 100)}`;
    moneyPopEl.classList.remove('show');
    void moneyPopEl.offsetWidth; // reflow
    moneyPopEl.classList.add('show');
  }
}

counterEl.addEventListener('animationend', (e) => {
  if (e.animationName === 'counterBump') counterEl.classList.remove('counter-bump');
});
if (moneyPopEl) {
  moneyPopEl.addEventListener('animationend', (e) => {
    if (e.animationName === 'moneyPop') moneyPopEl.classList.remove('show');
  });
}


    let totalCents = Number.parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    if (!Number.isFinite(totalCents) || totalCents < 0) totalCents = 0;

    function render() {
      counterEl.textContent = fmt.format(totalCents / 100);
    }

    function flashStatus(msg) {
      statusEl.textContent = msg;
      if (msg) setTimeout(() => { statusEl.textContent = ''; }, 1800);
    }

    soldBtn.addEventListener('click', () => {
      const priceCents = parseEuroToCents(priceEl.value);
      if (priceCents === null) {
        flashStatus('Please enter a valid price (e.g., 2,5).');
        priceEl.focus();
        return;
      }
      totalCents += priceCents;
      localStorage.setItem(STORAGE_KEY, String(totalCents));
      render();
      animateAdd(priceCents);
      flashStatus(`Added ${fmt.format(priceCents / 100)} 🎁`);
    });

    resetBtn.addEventListener('click', () => {
      totalCents = 0;
      localStorage.setItem(STORAGE_KEY, '0');
      render();
      flashStatus('Reset to €0,00');
    });

    // --- Snow generator ---
    (function makeSnow() {
      const snow = document.getElementById('snow');
      const flakeCount = 40;
      for (let i = 0; i < flakeCount; i++) {
        const f = document.createElement('div');
        f.className = 'flake';
        const left = Math.random() * 100;
        const size = 4 + Math.random() * 6;
        const duration = 6 + Math.random() * 10;
        const delay = Math.random() * 6;
        const drift = (-20 + Math.random() * 40) + 'vw';
        f.style.left = left + 'vw';
        f.style.width = size + 'px';
        f.style.height = size + 'px';
        f.style.animationDuration = duration + 's';
        f.style.animationDelay = (-delay) + 's';
        f.style.setProperty('--drift', drift);
        f.style.opacity = (0.55 + Math.random() * 0.45).toFixed(2);
        snow.appendChild(f);
      }
    })();


    // --- QR modal ---
    (function setupQrModal(){
      const openBtn = document.getElementById('qrOpenBtn');
      const modal = document.getElementById('qrModal');
      const closeBtn = document.getElementById('qrCloseBtn');
      if (!openBtn || !modal || !closeBtn) return;

      let lastFocus = null;

      function openModal(){
        lastFocus = document.activeElement;
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
        closeBtn.focus();
      }

      function closeModal(){
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
        if (lastFocus && typeof lastFocus.focus === 'function') lastFocus.focus();
      }

      openBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);

      // Click outside card closes
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      // Escape closes
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('show')) closeModal();
      });
    })();

    render();
  </script>
</body>
</html>
